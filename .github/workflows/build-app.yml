name: Build Desktop App

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22.x]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build frontend
        run: npm run build:frontend

      - name: Build backend
        run: npm run build:backend

      - name: Build Electron main process
        run: npm run build:electron

      - name: Build desktop app (Windows)
        if: runner.os == 'Windows'
        run: npm run dist:win -- --publish never

      - name: Build desktop app (macOS)
        if: runner.os == 'macOS'
        run: npm run dist:mac -- --publish never

      - name: Build desktop app (Linux)
        if: runner.os == 'Linux'
        run: npm run dist:linux -- --publish never

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: news-to-me-windows
          path: dist-final/*.exe
          retention-days: 30

      - name: Upload artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: news-to-me-macos
          path: |
            dist-final/*.dmg
            dist-final/*.zip
          retention-days: 30

      - name: Upload artifacts (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: news-to-me-linux
          path: |
            dist-final/*.AppImage
            dist-final/*.deb
          retention-days: 30

  create-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release files
        run: |
          mkdir -p release-files
          ls -la news-to-me-*/ || true
          cp news-to-me-windows/*.exe release-files/ || true
          cp news-to-me-macos/*.dmg release-files/ || true
          cp news-to-me-macos/*.zip release-files/ || true
          cp news-to-me-linux/*.AppImage release-files/ || true
          cp news-to-me-linux/*.deb release-files/ || true
          ls -la release-files/
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old releases (keep only latest 2)
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const releasesToDelete = releases.data.slice(2);
            for (const release of releasesToDelete) {
              console.log(`Deleting release ${release.tag_name}`);

              // Delete all assets in the release
              for (const asset of release.assets) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id
                });
              }

              // Delete the release
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id
              });
            }
